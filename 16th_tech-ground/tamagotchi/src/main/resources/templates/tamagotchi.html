<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>다마고치</title>
    <link rel="stylesheet" th:href="@{/css/tamagotchi.css}">
</head>
<body>
    <div class="room">
        <div class="device-wrapper">
            <img class="device-img" th:src="@{/images/room/{file}(file='tamagotchi_device.png')}" alt="다마고치">
            <div class="pet-area" th:if="${character}">
                <img class="pet-img"
                     th:src="@{/images/pet/{file}(file=${character + '.png'})}"
                     th:alt="${petName}">
                <p class="pet-name" th:text="${petName}"></p>
            </div>
        </div>
    </div>
</body>
</html>
